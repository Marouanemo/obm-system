# ============================================================
# OBM SYSTEM — Production nginx config
# Path: /etc/nginx/sites-available/obm-system.com
# Canonical: apex (obm-system.com) · www redirects to apex
# Tested with nginx/1.24 (Ubuntu 24.04)
# ============================================================

# ---- HTTP: redirect all to https://obm-system.com (apex) ----
server {
    listen 80;
    listen [::]:80;
    server_name obm-system.com www.obm-system.com;

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://obm-system.com$request_uri;
    }
}

# ---- HTTPS www: redirect to apex ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.obm-system.com;

    ssl_certificate     /etc/letsencrypt/live/www.obm-system.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.obm-system.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://obm-system.com$request_uri;
}

# ---- HTTPS apex: main site (canonical) ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name obm-system.com;

    root /var/www/obm-system/public;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/www.obm-system.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.obm-system.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ---- Security headers ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff
        font/woff2;

    # ---- Static asset caching ----
    location ~* \.(?:css|js|woff2?|svg|jpg|jpeg|png|webp|avif|ico|gif)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # ---- HTML — short cache ----
    location ~* \.html$ {
        expires 5m;
        add_header Cache-Control "public, max-age=300";
    }

    # ---- Default ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Hide hidden files ----
    location ~ /\.(?!well-known) {
        deny all;
    }

    error_page 404 /index.html;

    access_log /var/log/nginx/obm-system.access.log;
    error_log  /var/log/nginx/obm-system.error.log;
}
